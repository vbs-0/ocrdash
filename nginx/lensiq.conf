# LensIQ — nginx HTTPS reverse proxy
# Serves the dashboard + proxies API/WebSocket under ONE https origin so the
# in-dashboard camera QR scanner works (browsers require https for the camera)
# and there's no mixed-content blocking.
#
# Install: see nginx/setup-https.sh  (or copy to /etc/nginx/sites-available/ and symlink)

server {
    listen 80;
    server_name 129.159.20.37;
    return 301 https://$host$request_uri;     # force HTTPS
}

server {
    listen 443 ssl;
    server_name 129.159.20.37;

    ssl_certificate     /etc/nginx/ssl/lensiq.crt;
    ssl_certificate_key /etc/nginx/ssl/lensiq.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 1200M;               # large installer uploads (.exe ~700MB)

    # Dashboard (static frontend on :7789)
    location / {
        proxy_pass http://127.0.0.1:7789;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Backend REST API (:7788)
    location /api/ {
        proxy_pass http://127.0.0.1:7788;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 600s;              # long uploads
    }

    # WebSocket (:7788)
    location /ws/ {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
